<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Inventory</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/bootstrap-5.3.3-dist/bootstrap-5.3.3-dist/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/bootstrap-icons-1.11.3/bootstrap-icons-1.11.3/font/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/invetory.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>

<!-- SIDEBAR TOGGLE -->
<div class="hamburger" onclick="toggleSidebar()">
    <i class="bi bi-list"></i>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

    <div class="profile-box">

		<div class="profile-wrapper">
			<a 
		     onclick="openImagePopup('adminProfileImg', 'imagePopup', 'popupImage')">

		    <img id="adminProfileImg"
		         th:src="@{/admin/profile-image}"
		         alt="Profile Image"
		         class="profile-img"
		         onerror="this.style.display='none';
		         this.insertAdjacentHTML('afterend','<i class=\'bi bi-person-circle\' style=\'font-size:50px;color:#6c757d;\'></i>');">
			</a>
		

		<i class="bi bi-pencil-fill edit-icon"
		   onclick="document.getElementById('imageInput').click()"></i>

        <input type="file" id="imageInput" name="imageFile"
               accept="image/*"
               hidden
               onchange="uploadProfileImage(this)">
		</div>
    </div>

    <h6 class="text-white" th:text="${username}"></h6>

    <a class="sidebar-a" href="/adminDash"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a class="sidebar-a" href="/addWorker"><i class="bi bi-plus-circle"></i> Add HoD</a>
    <a class="sidebar-a" href="/add"><i class="bi bi-plus-circle"></i> Add Department</a>
    <a class="sidebar-a" href="/department"><i class="bi bi-journal-bookmark"></i> Departments</a>
	<a class="sidebar-a" href="/hods"><i class="bi-person-badge"></i> HoDs</a>
    <a class="sidebar-a btn btn-success text-white" th:href="@{/generate-report}" target="_blank">PDF Report</a>
    <a class="sidebar-a" href="/change-password"><i class="bi bi-key"></i> Change Password</a>
    <a class="sidebar-a" href="/logout"><i class="bi bi-box-arrow-left"></i> Logout</a>

</div>

<!-- USER INFO -->
<div class="container mt-3">
    <div class="alert alert-info text-center">
        Logged in as: <strong th:text="${Useremail}"></strong> | Administrator
    </div>
</div>

<!-- SEARCH + NOTIFICATION -->
<div class="top-bar">

    <form method="get" action="/adminSearchlist" class="search-form">
        <input type="text" name="keyword" class="form-control"
               placeholder="Search equipment..." th:value="${keyword}">

        <input type="hidden" name="deptId" th:value="${selectedDeptId}">

        <button class="btn btn-primary">
            <i class="bi bi-search"></i>
        </button>
    </form>

    <a href="/admin/requests" class="mail-btn">
        <i class="bi bi-envelope"></i>

        <span th:if="${unreadCount > 0}"
              th:text="${unreadCount}"
              class="badge bg-danger"></span>
    </a>

</div>

<!-- SUCCESS/ERROR -->
<div th:if="${successMessage}" class="alert alert-success text-center">
    <span th:text="${successMessage}"></span>
</div>

<div th:if="${errorMessage}" class="alert alert-danger text-center">
    <span th:text="${errorMessage}"></span>
</div>

<!-- FILTER -->
<form class="adminDash-form" th:action="@{/adminDash}" method="get">
    <h5>Display options</h5>

    <select name="deptId" class="form-select" onchange="this.form.submit()">
        <option th:value="0">All Departments</option>

        <option th:each="dept : ${departments}"
                th:value="${dept.id}"
                th:text="${dept.deptName}"
                th:selected="${dept.id == selectedDeptId}">
        </option>
    </select>
</form>

<!-- TABLE -->
<div class="table-responsive">
    <table class="table table-striped table-bordered">

        <thead class="table-dark">
        <tr>
            <th>Name</th>
            <th>Code</th>
            <th>Uploaded By</th>
            <th>Date</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="i : ${invetory}">
            <td th:text="${i.name}"></td>
            <td th:text="${i.codeNo}"></td>

            <td>
                <span th:if="${i.addedBy != null}" th:text="${i.addedBy.name}"></span>
                <span th:if="${i.addedBy == null}">N/A</span>
            </td>

            <td th:text="${i.addedDate}"></td>

            <td>
                <a th:href="@{/deleteEquipment/{id}(id=${i.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Delete this item?')">
                    Delete
                </a>
            </td>
        </tr>
        </tbody>

    </table>

    <div th:if="${#lists.isEmpty(invetory)}" class="alert alert-warning text-center">
        No equipment found
    </div>
</div>

<!-- POPUP -->
<div id="imagePopup" class="image-popup" style="display:none;">
	<div class="popup-box">
	    
	    <span class="close-btn" onclick="closeImagePopup('imagePopup')">&times;</span>
    	<img id="popupImage" class="popup-image">
	</div>
</div>

<!-- FOOTER -->
<footer class="footer">
    <h4>UKEREWE DC</h4>
</footer>

<script th:src="@{/bootstrap-5.3.3-dist/bootstrap-5.3.3-dist/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/invetory.js}"></script>

</body>
</html>
