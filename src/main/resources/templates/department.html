<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Departments List</title>
    <link rel="stylesheet" th:href="@{/bootstrap-5.3.3-dist/bootstrap-5.3.3-dist/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/bootstrap-icons-1.11.3/bootstrap-icons-1.11.3/font/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/invetory.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

    <div class="hamburger" onclick="toggleSidebar()">
        <i style="color: black;" class="bi bi-list"></i>
    </div>

    <div class="sidebar" id="sidebar">
        <div style="position: relative; display: inline-block;">
            <a href="javascript:void(0)" onclick="openImagePopup()">
                <img th:src="@{/admin/profile-image}"
                     alt="Profile Image"
                     onerror="this.style.display='none'; this.insertAdjacentHTML('afterend', '<i class=\'bi bi-person-circle\' style=\'font-size:50px;margin-left:45px;color:#6c757d;\'></i>');"
                     style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover;" />
            </a>
            <i class="bi bi-pencil-fill" 
               style="position: absolute; bottom: 0; right: 0; font-size: 16px; color: #fff; background-color: #0d6efd; border-radius: 50%; padding: 2px; cursor: pointer;"
               onclick="document.getElementById('imageInput').click()"></i>

            <!-- Hidden File Input -->
            <input type="file" id="imageInput" name="imageFile" accept="image/*" style="display:none;" 
                   onchange="uploadProfileImage(this)">
        </div>

        <h6 style="color: white; padding-left: 10px;" th:text="${username}"></h6>

        <a class="sidebar-a" href="/adminDash"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
        <a class="sidebar-a" href="/addWorker"><i class="bi bi-plus-circle"></i>Add HoD to new Dpt</a>
        <a class="sidebar-a" href="/add"><i class="bi bi-plus-circle"></i>Add Department</a>
        <a class="sidebar-a" href="/department"><i class="bi bi-journal-bookmark"></i>Department List</a>
        <a class="btn btn-success sidebar-a" th:href="@{/generate-report}" target="_blank"> PDF Report</a>
        <a class="sidebar-a" href="/change-password"><i class="bi bi-key"></i> Change Password</a>
        <a class="sidebar-a" href="/logout"><i class="bi bi-box-arrow-left"></i> Logout</a>
    </div>

    <div class="navbar-nav d-flex navbar-expand-lg">
        <div class="nav-item d-flex navbar-expand-lg bg-dark">
            <div class="position-absolute top-0 end-0 mt-3 me-3">
                <form method="get" action="/adminDeptlist" class="d-flex mb-3">
                    <input style="width: 250px; height:50px; margin-top: 10px;" type="text" name="keyword" class="form-control me-2" placeholder="Search department by name..." />
                    <button id="toggleBtn" style="width: 60px; height:50px; margin-top: 10px;" type="submit" class="btn btn-primary">
                        <i class="bi bi-search"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div th:if="${param.deleted}" class="alert alert-success mt-3">
        Department and HOD deleted successfully!
    </div>

    <div class="container mt-5">
        <h2>Departments and Heads of Department</h2>
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Department Name</th>
                    <th>Head of Department Email</th>
                    <th>Manage</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="dept : ${departments}">
                    <td th:text="${dept.deptName}"></td>
                    <td th:text="${dept.hod != null ? dept.hod.email : 'No HOD assigned'}"></td>
                    <td>
                        <button class="btn btn-danger btn-sm" th:onclick="'confirmDelete(' + ${dept.id} + ');'">Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>
        <div th:if="${#lists.isEmpty(departments)}" class="alert alert-warning text-center" style="margin: 15px 0;">
            No Department found.
        </div>
    </div>

    <script th:src="@{/bootstrap-5.3.3-dist/bootstrap-5.3.3-dist/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/invetory.js}"></script>
</body>
</html>
