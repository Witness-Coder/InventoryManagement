<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Update Equipment</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          th:href="@{/bootstrap-5.3.3-dist/bootstrap-5.3.3-dist/css/bootstrap.min.css}">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          th:href="@{/bootstrap-icons-1.11.3/bootstrap-icons-1.11.3/font/bootstrap-icons.min.css}">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <!-- Main CSS -->
    <link rel="stylesheet"
          th:href="@{/css/invetory.css}">
</head>

<body class="update-equipment-body">

    <!-- Background Overlay -->
    <div class="update-overlay">

        <!-- Main Container -->
        <div class="container py-5">

            <div class="update-card mx-auto">

                <!-- Top Icon -->
                <div class="text-center mb-4">

                    <div class="update-icon-box">
                        <i class="bi bi-pencil-square"></i>
                    </div>

                </div>

                <!-- Heading -->
                <div class="text-center mb-4">

                    <h2 class="update-title"
                        th:text="${PageTitle}">

                        Update Equipment

                    </h2>

                    <p class="update-subtitle">
                        Update equipment information below
                    </p>

                </div>

                <!-- Form -->
                <form method="post"
                      action="/update"
                      th:object="${equipment}">

                    <!-- Hidden Fields -->
                    <input type="hidden" th:field="*{id}" />

                    <input type="hidden"
                           th:field="*{departmentId}" />

                    <input type="hidden"
                           th:field="*{addedBy}" />

                    <!-- Equipment Name -->
                    <div class="mb-4">

                        <label class="form-label">
                            <i class="bi bi-box-seam me-1"></i>
                            Equipment Name
                        </label>

                        <input type="text"
                               class="form-control update-input"
                               th:field="*{name}"
                               placeholder="Enter equipment name"
                               required />

                    </div>

                    <!-- Equipment Code -->
                    <div class="mb-4">

                        <label class="form-label">
                            <i class="bi bi-upc-scan me-1"></i>
                            Equipment Code
                        </label>

                        <input type="text"
                               class="form-control update-input"
                               th:field="*{codeNo}"
                               placeholder="Enter equipment code"
                               required />

                    </div>

                    <!-- Buttons -->
                    <div class="update-btn-group">

                        <button type="submit"
                                class="btn update-btn-primary">

                            <i class="bi bi-check-circle"></i>
                            Update Equipment

                        </button>

                        <a href="/invet"
                           class="btn update-btn-secondary">

                            <i class="bi bi-arrow-left"></i>
                            Cancel Editing

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script th:src="@{/bootstrap-5.3.3-dist/bootstrap-5.3.3-dist/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
