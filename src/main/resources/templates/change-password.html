<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Change Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/bootstrap-5.3.3-dist/bootstrap-5.3.3-dist/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/bootstrap-icons-1.11.3/bootstrap-icons-1.11.3/font/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/invetory.css}">
</head>

<body>


<!-- PAGE -->
<div class="password-page">

    <div class="password-card">

        <h3 class="text-center mb-4">Change Password</h3>

        <form th:action="@{/change-password}" method="post">

            <!-- CURRENT -->
            <div class="mb-3">
                <label>Current Password</label>
                <input type="password" name="currentPassword"
                       class="form-control" required>
            </div>

            <!-- NEW -->
            <div class="mb-3">
                <label>New Password</label>
                <input type="password" name="newPassword"
                       class="form-control" required>
            </div>

            <!-- CONFIRM -->
            <div class="mb-3">
                <label>Confirm Password</label>
                <input type="password" name="confirmPassword"
                       class="form-control" required>
            </div>

            <!-- BUTTON -->
            <button class="btn btn-primary w-100">
                Change Password
            </button>

        </form>

        <!-- MESSAGE -->
        <div class="mt-3 text-center">
            <p class="text-success" th:text="${message}"></p>
        </div>
		<div class="mt-3 text-center">
		            <p class="text-danger" th:text="${error}"></p>
		 </div>

    </div>

</div>

<script th:src="@{/bootstrap-5.3.3-dist/bootstrap-5.3.3-dist/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/invetory.js}"></script>

</body>
</html>
