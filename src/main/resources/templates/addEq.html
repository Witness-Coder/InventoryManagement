<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Equipment</title>

    <link rel="stylesheet" th:href="@{/bootstrap-5.3.3-dist/bootstrap-5.3.3-dist/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/bootstrap-icons-1.11.3/bootstrap-icons-1.11.3/font/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/invetory.css}">
</head>

<body>

<!-- HAMBURGER -->
<div class="hamburger" onclick="toggleSidebar()">
    <i class="bi bi-list"></i>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

    <div class="profile-box">
        <a href="javascript:void(0)" onclick="openWorkerImagePopup()">
            <img id="workerProfilePic"
                 th:src="@{'/worker/profile-image/' + ${session.UserEmail}}"
                 alt="Profile"
                 style="width:50px;height:50px;border-radius:50%;object-fit:cover;"
                 onerror="this.style.display='none';
                 this.insertAdjacentHTML('afterend','<i class=\'bi bi-person-circle\' style=\'font-size:50px;color:#6c757d;\'></i>');">
        </a>

        <i class="bi bi-pencil-fill edit-icon"
           onclick="document.getElementById('workerImageInput').click()"></i>

        <input type="file" id="workerImageInput" hidden
               accept="image/*"
               onchange="uploadWorkerProfileImage(this)">
    </div>

    <h6 style="color:white;" th:text="${username}"></h6>

    <a class="sidebar-a" href="/invet"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a class="sidebar-a" href="/addEq"><i class="bi bi-plus-circle"></i> Add Equipment</a>
    <a class="sidebar-a" href="/change-password"><i class="bi bi-key"></i> Change Password</a>
    <a class="sidebar-a" href="/logout"><i class="bi bi-box-arrow-left"></i> Logout</a>

</div>

<!-- INFO BOX -->
<div class="container mt-3">
    <div class="alert alert-info text-center">
        Logged in as: <strong th:text="${Useremail}"></strong> |
        Department: <strong th:text="${department}"></strong>
    </div>
</div>

<!-- PAGE -->
<div class="equipment-page">

    <div class="equipment-card">

        <h3 class="text-center mb-4">Add Office Equipment</h3>

        <!-- ALERTS -->
        <div th:if="${message}" class="alert alert-success text-center" th:text="${message}"></div>
        <div th:if="${message2}" class="alert alert-danger text-center" th:text="${message2}"></div>

        <!-- FORM -->
        <form th:action="@{/saveEq}" th:object="${equipment}" method="post">

            <!-- CODE -->
            <div class="mb-3">
                <label>Equipment Code No</label>
                <input type="text"
                       th:field="*{codeNo}"
                       class="form-control"
                       placeholder="Enter code number"
                       required>
            </div>

            <!-- NAME -->
            <div class="mb-3">
                <label>Equipment Name</label>
                <input type="text"
                       th:field="*{name}"
                       class="form-control"
                       placeholder="Enter name"
                       required>
            </div>

            <!-- BUTTON -->
            <button class="btn btn-primary w-100">
                Submit
            </button>

        </form>

    </div>

</div>

<script th:src="@{/bootstrap-5.3.3-dist/bootstrap-5.3.3-dist/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/invetory.js}"></script>

</body>
</html>
