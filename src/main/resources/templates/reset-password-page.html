<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reset Password</title>
    <link rel="stylesheet" th:href="@{/bootstrap-5.3.3-dist/bootstrap-5.3.3-dist/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/bootstrap-icons-1.11.3/bootstrap-icons-1.11.3/font/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/invetory.css}">
</head>
<body>
    <div class="container mt-5" style="max-width: 500px;">
        <h3>Reset Password</h3>

        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form method="post" action="/reset-password">
            <input type="hidden" name="token" th:value="${token}">
            
            <div class="mb-3">
                <label for="newPassword" class="form-label">New Password:</label>
                <input type="password" name="newPassword" class="form-control" placeholder="Enter new password" required>
            </div>

            <button type="submit" class="btn btn-primary">Reset Password</button>
        </form>

        <p class="mt-2"><a th:href="@{/login}">Back to login</a></p>
    </div>
</body>
</html>
