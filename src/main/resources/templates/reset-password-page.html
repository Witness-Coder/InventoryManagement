<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>

    <link rel="stylesheet" th:href="@{/bootstrap-5.3.3-dist/bootstrap-5.3.3-dist/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/bootstrap-icons-1.11.3/bootstrap-icons-1.11.3/font/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/invetory.css}">
</head>

<body class="reset-password-body">

    <!-- Overlay -->
    <div class="reset-overlay"></div>

    <!-- Main Wrapper -->
    <div class="reset-wrapper">

        <div class="reset-card">

            <!-- Logo -->
            <div class="reset-logo-box">
                <img src="/images/thumb_97_102x110_0_0_crop.png"
                     alt="Logo"
                     class="reset-logo">
            </div>

            <!-- Heading -->
            <div class="text-center mb-4">
                <h2 class="reset-title">Reset Password</h2>

                <p class="reset-subtitle">
                    Create a new strong password for your account.
                </p>
            </div>

            <!-- Alerts -->
            <div th:if="${message}"
                 class="alert alert-success text-center"
                 th:text="${message}">
            </div>

            <div th:if="${error}"
                 class="alert alert-danger text-center"
                 th:text="${error}">
            </div>

            <!-- Form -->
            <form method="post" action="/reset-password">

                <!-- Hidden Token -->
                <input type="hidden" name="token" th:value="${token}">

                <!-- Password -->
                <div class="mb-4">

                    <label class="form-label fw-semibold">
                        New Password
                    </label>

                    <div class="input-group reset-input-group">

                        <span class="input-group-text">
                            <i class="bi bi-lock-fill"></i>
                        </span>

                        <input type="password"
                               name="newPassword"
                               class="form-control reset-input"
                               placeholder="Enter new password"
                               required>

                    </div>
                </div>

                <!-- Submit -->
                <button type="submit"
                        class="btn reset-btn w-100">

                    <i class="bi bi-shield-lock-fill me-2"></i>
                    Reset Password

                </button>

            </form>

            <!-- Back -->
            <div class="text-center mt-4">
                <a th:href="@{/login}" class="reset-back-link">

                    <i class="bi bi-arrow-left-circle me-1"></i>
                    Back to Login

                </a>
            </div>

        </div>

    </div>

</body>
</html>
