<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory</title>

    <link rel="stylesheet" th:href="@{/bootstrap-5.3.3-dist/bootstrap-5.3.3-dist/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/bootstrap-icons-1.11.3/bootstrap-icons-1.11.3/font/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/invetory.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body class="inventory-page">

<!-- SIDEBAR -->
<div class="hamburger" onclick="toggleSidebar()">
    <i class="bi bi-list"></i>
</div>

<div class="sidebar" id="sidebar">

	<div class="profile-box">

	    <div class="profile-wrapper">
	        <a href="javascript:void(0)" onclick="openWorkerImagePopup()">
	            <img id="workerProfilePic"
	                 th:src="@{'/worker/profile-image/' + ${session.UserEmail}}"
	                 th:attr="data-email=${session.UserEmail}"
	                 alt="Profile"
	                 onerror="this.style.display='none';
	                 this.insertAdjacentHTML('afterend','<i class=\'bi bi-person-circle default-icon\'></i>');"/>
	        </a>

	        <!-- Pencil Icon -->
	        <i class="bi bi-pencil-fill edit-icon"
	           onclick="document.getElementById('workerImageInput').click()"></i>

	        <!-- Hidden file input -->
	        <input type="file"
	               id="workerImageInput"
	               accept="image/*"
	               onchange="uploadWorkerProfileImage(this)">
	    </div>

	</div>

    <h6 th:text="${username}"></h6>

    <a class="sidebar-a" href="/invet">Dashboard</a>
    <a class="sidebar-a" href="/addEq">Add Inventory</a>
    <a class="sidebar-a" href="/change-password">Change Password</a>
    <a class="sidebar-a" href="/logout">Logout</a>
</div>

<!-- HEADER -->
<div class="container mt-3">
    <div class="info-card">
        <h5>Logged in as: <strong th:text="${Useremail}"></strong></h5>
        <h6>Department: <strong th:text="${department}"></strong></h6>
    </div>
</div>

<!-- SEARCH -->
<div class="search-wrapper">
    <form method="get" action="/list" class="search-form">
        <input class="form-control" type="text"
               name="keyword"
               th:value="${param.keyword}"
               placeholder="Search equipment..." />
        <button class="btn btn-primary" type="submit">
            <i class="bi bi-search"></i>
        </button>
    </form>
</div>

<!-- TITLE -->
<div class="text-center mt-3">
    <img src="/images/thumb_97_102x110_0_0_crop.png" alt="Logo">
    <h4 class="mt-2">
        Welcome <span th:text="${Useremail}"></span>
    </h4>
</div>

<!-- TABLE -->
<div class="container mt-4">
    <div class="table-responsive">
        <table class="table table-striped table-bordered inventory-table">
            <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Code</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="i : ${invetory}">
                <td th:text="${i.name}"></td>
                <td th:text="${i.codeNo}"></td>
                <td th:text="${i.addedDate}"></td>
                <td>
                    <a th:href="@{/edit(id=${i.id})}" class="btn btn-warning btn-sm">Edit</a>
                    <a th:href="@{/delete(id=${i.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Delete this item?')">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(invetory)}"
             class="alert alert-warning text-center">
            No equipment found
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer class="footer">
    <h4>UKEREWE DC</h4>

    <div class="footer-content">
        <div>
            <h5>Contact</h5>
            <p>Email: ps@ukerewedc.go.tz</p>
            <p>Tel: +255 677 005 025</p>
        </div>

        <div>
            <h5>Follow Us</h5>
            <div class="social">
                <img src="/images/facebook.PNG">
                <img src="/images/twitterLogo.jpg">
                <img src="/images/youtubeLogo.png">
            </div>
        </div>
    </div>

    <p class="copy">&copy; 2025 Ukerewe DC</p>
</footer>


<!-- Worker Image Popup -->
<div id="workerImagePopup" class="image-popup" style="display:none;">
    
    <div class="popup-box">
        
        <span class="close-btn" onclick="closeWorkerImagePopup()">&times;</span>
        
        <img id="popupWorkerImage" class="popup-image">
        
    </div>

</div>
<script th:src="@{/js/invetory.js}"></script>
</body>
</html>
