<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" th:href="@{/bootstrap-5.3.3-dist/bootstrap-5.3.3-dist/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/bootstrap-icons-1.11.3/bootstrap-icons-1.11.3/font/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/invetory.css}">
</head>

<body class="login-page-body">

    <!-- Overlay -->
    <div class="login-overlay"></div>

    <!-- Login Wrapper -->
    <div class="login-wrapper">

        <div class="modern-login-box">

            <!-- Logo -->
            <div class="login-logo-box">
                <img src="/images/thumb_97_102x110_0_0_crop.png"
                     alt="Logo"
                     class="login-logo">
            </div>

            <!-- Heading -->
            <div class="text-center mb-4">

                <h1 class="login-title">
                    Welcome Back
                </h1>

                <p class="login-subtitle">
                    Login into your Inventory Management account
                </p>

            </div>

            <!-- Form -->
            <form method="post"
                  action="/auth"
                  class="needs-validation"
                  novalidate>

                <!-- Email -->
                <div class="mb-4">

                    <label for="email"
                           class="form-label fw-semibold">
                        Email Address
                    </label>

                    <div class="input-group login-input-group">

                        <span class="input-group-text">
                            <i class="bi bi-envelope-fill"></i>
                        </span>

                        <input type="email"
                               name="email"
                               class="form-control login-input"
                               id="email"
                               placeholder="Enter your email"
                               required />

                    </div>

                </div>

                <!-- Password -->
                <div class="mb-3">

                    <label for="password"
                           class="form-label fw-semibold">
                        Password
                    </label>

                    <div class="input-group login-input-group">

                        <span class="input-group-text">
                            <i class="bi bi-lock-fill"></i>
                        </span>

                        <input type="password"
                               name="password"
                               class="form-control login-input"
                               id="password"
                               placeholder="Enter your password"
                               required />

                    </div>

                </div>

				<div class="mt-3 text-center">
					 <p class="text-danger" th:text="${error}"></p>
				</div>
                <!-- Login Button -->
                <button type="submit"
                        class="btn login-btn w-100">

                    <i class="bi bi-box-arrow-in-right me-2"></i>
                    Login

                </button>
				
				

            </form>
			

            <!-- Links -->
            <div class="login-links text-center">

                <a href="/request-add"
                   class="request-link">

                    <i class="bi bi-person-plus-fill me-1"></i>
                    Don't have an account? Contact Admin

                </a>

                <a href="/forgot-password-page"
                   class="forgot-link">

                    Forgot Password?

                </a>

            </div>

        </div>

    </div>

    <!-- Scripts -->
    <script th:src="@{/bootstrap-5.3.3-dist/bootstrap-5.3.3-dist/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
