<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/bootstrap-5.3.3-dist/bootstrap-5.3.3-dist/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/bootstrap-icons-1.11.3/bootstrap-icons-1.11.3/font/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/invetory.css}">
</head>
<body>

<div class="container mt-5" style="max-width: 400px;">
    <h2 class="text-center" style="color:rgb(0, 0, 0); margin-top: 50px;">
        Welcome! Login into Account
    </h2>

    <div class="text-center login-box mt-4">
        <img src="/images/thumb_97_102x110_0_0_crop.png" alt="Logo" class="mb-3">

        <form method="post" action="/auth" class="needs-validation" novalidate>
            <div class="mb-3">
                <label style="color:rgb(128, 128, 128);" for="email" class="form-label">Email:</label>
                <input style="color:rgb(0, 0, 128);" type="email" name="email" class="form-control" id="email" required />
            </div>

            <div class="mb-3">
                <label style="color:rgb(128, 128, 128);" for="password" class="form-label">Password:</label>
                <input style="color:rgb(0, 0, 128);" type="password" name="password" class="form-control" id="password" required />
            </div>

            <p th:if="${error}" th:text="${error}" class="text-danger mb-3"></p>

            <button type="submit" class="btn btn-secondary w-100">Login</button>
        </form>

        <div class="mt-3 text-center">
            <a href="/request-add" style="text-decoration: none;">Don't have an account? Contact Admin</a><br>
            <a href="/forgot-password-page" style="color: red; text-decoration: none;">Forgot Password?</a>
        </div>

        <div class="mt-3 text-center">
            <a href="/">
                <button class="btn btn-dark">BACK</button>
            </a>
        </div>
    </div>
</div>

<script th:src="@{/bootstrap-5.3.3-dist/bootstrap-5.3.3-dist/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
