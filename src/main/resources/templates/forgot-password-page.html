<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Forgot Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/bootstrap-5.3.3-dist/bootstrap-5.3.3-dist/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/bootstrap-icons-1.11.3/bootstrap-icons-1.11.3/font/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/invetory.css}">
</head>

<body class="forgot-password-body">

    <!-- Background Overlay -->
    <div class="forgot-overlay"></div>

    <!-- Forgot Password Card -->
    <div class="forgot-wrapper">

        <div class="forgot-card">

            <!-- Logo -->
            <div class="forgot-logo-box">
                <img src="/images/thumb_97_102x110_0_0_crop.png"
                     alt="Logo"
                     class="forgot-logo">
            </div>

            <!-- Title -->
            <div class="text-center mb-4">
                <h2 class="forgot-title">Forgot Password</h2>
                <p class="forgot-subtitle">
                    Enter your registered email to receive a password reset link.
                </p>
            </div>

            <!-- Alerts -->
            <div th:if="${message}" 
                 class="alert alert-success text-center"
                 th:text="${message}">
            </div>

            <div th:if="${error}" 
                 class="alert alert-danger text-center"
                 th:text="${error}">
            </div>

            <!-- Form -->
            <form method="post" action="/forgot-password">

                <div class="mb-4">
                    <label for="email" class="form-label fw-semibold">
                        Email Address
                    </label>

                    <div class="input-group forgot-input-group">
                        <span class="input-group-text">
                            <i class="bi bi-envelope-fill"></i>
                        </span>

                        <input type="email"
                               id="email"
                               name="email"
                               class="form-control forgot-input"
                               placeholder="Enter your registered email"
                               required>
                    </div>
                </div>

                <button type="submit" 
                        class="btn forgot-btn w-100">
                    <i class="bi bi-send-fill me-2"></i>
                    Send Reset Link
                </button>

            </form>

            <!-- Back -->
            <div class="text-center mt-4">
                <a th:href="@{/login}" class="forgot-back-link">
                    <i class="bi bi-arrow-left-circle me-1"></i>
                    Back to Login
                </a>
            </div>

        </div>

    </div>

</body>
</html>
